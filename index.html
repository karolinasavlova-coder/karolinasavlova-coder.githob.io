<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etapa | Internetový časopis</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-soft: #353b48;
            --cream: #f5f6fa;
            --gold-muted: #dcdde1;
            --soft-blue: #718093;
            --accent-red: #ff3e3e; /* Výraznější, svítivější červená */
            --line-yellow: rgba(255, 223, 0, 0.15); /* Jemná, průsvitná žlutá linka */
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: var(--cream);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Diagonální linka na pozadí */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 1px;
            background: var(--line-yellow);
            transform: rotate(35deg);
            transform-origin: top left;
            z-index: -1;
        }

        nav {
            padding: 40px 60px;
            z-index: 10;
        }

        nav a {
            color: var(--cream);
            font-size: 1.4rem;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover { color: var(--accent-red); }

        main {
            flex: 1;
            padding: 0 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 5;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 15vw, 9rem);
            margin: 0;
            color: var(--gold-muted); /* Název Etapa */
            font-weight: 700;
            line-height: 1;
        }

        .slogan {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.8rem;
            color: var(--accent-red); /* Výrazný slogan */
            margin-top: 15px;
            letter-spacing: 1px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 62, 62, 0.2);
        }

        .author {
            font-weight: 300;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 30px;
            letter-spacing: 4px;
            border-bottom: 1px solid var(--soft-blue);
            display: inline-block;
            padding-bottom: 10px;
        }

        .cta-container {
            text-align: right;
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            gap: 20px; /* Mezera mezi tlačítky */
            flex-wrap: wrap;
        }

        .article-link {
            font-family: 'Playfair Display', serif;
            color: var(--cream);
            text-decoration: none;
            font-size: 1.3rem;
            border: 1px solid var(--accent-red);
            padding: 12px 30px;
            transition: 0.4s;
            white-space: nowrap;
        }

        .article-link:hover {
            background: var(--accent-red);
            color: white;
        }

        footer {
            padding: 30px 60px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--soft-blue);
        }

        /* Styl pro mobilní zařízení, aby tlačítka nebyla nalepená na sobě */
        @media (max-width: 600px) {
            .cta-container {
                flex-direction: column;
                align-items: flex-end;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><i class="fas fa-home"></i></a>
    </nav>

    <main>
        <h1>Etapa</h1>
        <p class="slogan">spotlight na nová témata</p>
        <div class="author">Karolína Šavlová</div>

        <div class="cta-container">
            <a href="Valecia___City_of_arts_and_sciences.pdf" class="article-link" target="_blank">Moje oblíbené místo</a>
            
            <a href="clanek.html" class="article-link">Nejnovější článek →</a>
        </div>
    </main>

    <footer>
        internetový časopis
    </footer>

</body>
</html>
