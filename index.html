<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etapa | Karolína Šavlová</title>
    <style>
        /* Definice barev a základní styl */
       body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Praha1.jpg */
    background-image: linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.8)), url('praha.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

        .karta {
            background-color: #34495e; /* Světlejší tmavě šedá */
            border-top: 5px solid #e74c3c; /* Červený detail nahoře */
            border-bottom: 5px solid #3498db; /* Modrý detail dole */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #f1c40f; /* Žlutá pro název Etapa */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #ffffff;
        }

        .podtrzitko {
            height: 3px;
            width: 50px;
            background-color: #f1c40f; /* Žlutý detail */
            margin: 20px auto;
        }

        p {
            line-height: 1.6;
            color: #bdc3c7; /* Světle šedý text pro popis */
            font-size: 1.1rem;
        }

        .kontakt-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #e74c3c; /* Červená */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .kontakt-btn:hover {
            background-color: #3498db; /* Změna na modrou při najetí */
        }
    </style>
</head>
<body>

    <div class="karta">
        <h1>Etapa</h1>
        <h2>Karolína Šavlová</h2>
        <div class="podtrzitko"></div>
        <p>Ahoj, jsem studentka střední školy v Praze a ráda čtu.</p>
        <a href="#" class="kontakt-btn">Více o mně</a>
    </div>

</body>
</html>
